<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUROSTORE.id - Anshin & Hayai Digital Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #060913;
            --panel-dark: #0d1326;
            --neon-blue: #00f0ff;
            --neon-pink: #ff0055;
            --neon-gold: #ffb700;
            --text-gray: #a3b3cc;
            --cyber-grid: linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px), linear-gradient(180deg, rgba(0,240,255,0.03) 1px, transparent 1px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: var(--cyber-grid);
            background-size: 30px 30px;
            color: #ffffff;
            overflow-x: hidden;
        }

        h1, h2, h3, .cyber-font {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        /* Header & Navigation */
        header {
            background: rgba(13, 19, 38, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-blue);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--neon-gold);
            box-shadow: 0 0 10px rgba(255, 183, 0, 0.4);
        }

        .brand-text h1 {
            font-size: 1.4rem;
            color: #fff;
            text-shadow: 0 0 8px rgba(255,255,255,0.3);
        }

        .brand-text span {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            color: var(--neon-pink);
            font-weight: bold;
            display: block;
            margin-top: -2px;
        }

        .tagline-top {
            font-family: 'Rajdhani', sans-serif;
            color: var(--text-gray);
            font-size: 1rem;
            font-weight: 500;
        }

        .tagline-top span {
            color: var(--neon-blue);
        }

        /* Main Layout */
        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2.2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 992px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        /* Panel Glassmorphism */
        .cyber-panel {
            background: rgba(13, 19, 38, 0.7);
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 12px;
            padding: 25px;
            position: relative;
            box-shadow: inset 0 0 15px rgba(0, 240, 255, 0.05);
        }

        .cyber-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 15px;
            height: 15px;
            border-top: 3px solid var(--neon-blue);
            border-left: 3px solid var(--neon-blue);
            border-top-left-radius: 12px;
        }

        /* Step Title */
        .step-title {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
        }

        .step-num {
            background: var(--neon-blue);
            color: var(--bg-dark);
            width: 30px;
            height: 30px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* Cyber Alert Notice */
        .cyber-alert {
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid var(--neon-pink);
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 20px;
            color: #ffcbd7;
            font-size: 0.88rem;
            line-height: 1.4;
            display: none;
        }

        .cyber-alert strong {
            color: var(--neon-pink);
            text-shadow: 0 0 5px rgba(255, 0, 85, 0.4);
        }

        /* Game Selector Grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .game-card {
            background: rgba(6, 9, 19, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .game-card:hover {
            border-color: var(--neon-blue);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 240, 255, 0.15);
        }

        .game-card.active {
            border-color: var(--neon-pink);
            background: rgba(255, 0, 85, 0.05);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.2);
        }

        .game-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }

        .game-card h4 {
            font-size: 0.95rem;
            color: #fff;
        }

        .game-card span {
            font-size: 0.75rem;
            color: var(--text-gray);
            display: block;
            margin-top: 4px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--neon-blue);
        }

        .input-row {
            display: flex;
            gap: 15px;
        }

        .cyber-input {
            width: 100%;
            background: rgba(6, 9, 19, 0.9);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 6px;
            padding: 12px 15px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .cyber-input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        /* Item Grid */
        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .item-card {
            background: rgba(6, 9, 19, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }

        .item-card:hover {
            border-color: var(--neon-blue);
            background: rgba(0, 240, 255, 0.02);
        }

        .item-card.active {
            border-color: var(--neon-gold);
            background: rgba(255, 183, 0, 0.03);
            box-shadow: 0 0 12px rgba(255, 183, 0, 0.15);
        }

        .item-name {
            font-weight: 600;
            font-size: 1.05rem;
            color: #fff;
            margin-bottom: 5px;
        }

        .item-price {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-gold);
            font-size: 0.95rem;
        }

        /* Payment Selector Grid */
        .payment-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .payment-method {
            background: rgba(6, 9, 19, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .payment-method:hover {
            border-color: var(--neon-blue);
        }

        .payment-method.active {
            border-color: var(--neon-blue);
            background: rgba(0, 240, 255, 0.05);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .pay-title {
            font-family: 'Rajdhani', sans-serif;
            font-weight: bold;
            font-size: 1.1rem;
            color: #fff;
        }

        .pay-details {
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-top: 2px;
        }

        .pay-badge {
            background: rgba(0, 240, 255, 0.1);
            color: var(--neon-blue);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }

        /* Right Sidebar Panel */
        .side-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Checkout Button */
        .btn-checkout {
            width: 100%;
            background: linear-gradient(135deg, var(--neon-pink), #b3003b);
            color: white;
            border: none;
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.3);
            margin-top: 15px;
            text-transform: uppercase;
        }
